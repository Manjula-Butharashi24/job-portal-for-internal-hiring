<aside class="sidebar" [class.collapsed]="collapsed">
  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-icon">
      <i class="bi bi-lightning-charge-fill"></i>
    </div>
    <span class="brand-text">NextHire</span>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      class="nav-item"
      [class.active]="isActive(item.route)"
    >
      <i class="bi {{ item.icon }} nav-icon"></i>
      <span class="nav-label">{{ item.label }}</span>
      <span *ngIf="item.badge" class="nav-badge">{{ item.badge }}</span>
    </a>
  </nav>

  <!-- Spacer -->
  <div class="sidebar-spacer"></div>

  <!-- User info -->
  <div class="sidebar-user">
    <div class="user-avatar">{{ initials }}</div>
    <div class="user-info" *ngIf="!collapsed">
      <div class="user-name">{{ user?.name }}</div>
      <span class="badge-status {{ roleClass }} user-role-badge">{{ roleLabel }}</span>
    </div>
  </div>

  <!-- Logout -->
  <button class="sidebar-logout" (click)="logout()">
    <i class="bi bi-box-arrow-left"></i>
    <span *ngIf="!collapsed">Sign Out</span>
  </button>
</aside>
