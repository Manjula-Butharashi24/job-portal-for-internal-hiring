<div class="page-header">
  <div>
    <div class="breadcrumb-custom">
      <a routerLink="/hr/dashboard">Dashboard</a><span>/</span>
      <span class="active">Profile</span>
    </div>
    <h1 class="page-title">My Profile</h1>
    <p class="page-subtitle">Manage your personal information</p>
  </div>
</div>

<div style="display:grid; grid-template-columns:300px 1fr; gap:24px; align-items:start">

  <!-- Left card -->
  <div>
    <div class="card card-body-custom" style="text-align:center; margin-bottom:16px">
      <div class="avatar avatar-xl"
           style="margin:0 auto 16px; font-size:36px; background:linear-gradient(135deg,var(--primary),var(--accent))">
        {{ initials }}
      </div>
      <h4 style="margin-bottom:4px">{{ user.name }}</h4>
      <p style="color:var(--text-muted); font-size:13px; margin-bottom:12px">{{ user.email }}</p>
      <span class="badge-status badge-hr" style="margin-bottom:16px; display:inline-flex">HR Manager</span>
      <div class="section-divider"></div>
      <div style="text-align:left">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px; font-size:13px; color:var(--text-secondary)">
          <i class="bi bi-building" style="color:var(--primary)"></i> {{ user.department || 'Not set' }}
        </div>
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px; font-size:13px; color:var(--text-secondary)">
          <i class="bi bi-geo-alt" style="color:var(--primary)"></i> {{ user.location || 'Not set' }}
        </div>
        <div style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary)">
          <i class="bi bi-telephone" style="color:var(--primary)"></i> {{ user.phone || 'Not set' }}
        </div>
      </div>
    </div>

    <!-- HR Stats -->
    <div class="card card-body-custom">
      <h6 style="font-weight:700; margin-bottom:16px; font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-muted)">HR Activity</h6>
      <div *ngFor="let s of stats" style="display:flex; align-items:center; gap:12px; margin-bottom:14px">
        <div style="width:36px;height:36px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center">
          <i class="bi {{ s.icon }}" [style.color]="s.color"></i>
        </div>
        <div>
          <div style="font-weight:700; font-size:16px">{{ s.value }}</div>
          <div style="font-size:12px; color:var(--text-muted)">{{ s.label }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Personal Info only -->
  <div class="card card-body-custom">
    <h6 style="font-weight:700; margin-bottom:20px; font-size:15px">Personal Information</h6>
    <form [formGroup]="form" (ngSubmit)="saveProfile()">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-control" formControlName="name" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-control" formControlName="email" type="email">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-control" formControlName="phone" placeholder="+1 555-0000">
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input class="form-control" formControlName="location" placeholder="City, State">
        </div>
        <div class="form-group">
          <label class="form-label">Department</label>
          <input class="form-control" formControlName="department">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-md" [disabled]="saving">
        <span class="spinner-border spinner-border-sm me-1" *ngIf="saving"></span>
        {{ saving ? 'Saving…' : 'Save Changes' }}
      </button>
    </form>
  </div>

</div>
